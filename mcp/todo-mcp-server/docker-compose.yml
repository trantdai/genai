version: '3.8'

services:
  # Backend API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: todo-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - todo-network
    restart: unless-stopped

  # MCP Server Service
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: todo-mcp
    ports:
      - "8080:8080"
    environment:
      - TODO_API_URL=http://api:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_PORT=8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - todo-network
    restart: unless-stopped

networks:
  todo-network:
    driver: bridge
